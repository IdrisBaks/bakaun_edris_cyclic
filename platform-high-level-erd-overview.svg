    <rect x="74" y="184" rx="12" ry="12" width="382" height="142" class="inner" stroke="#93c5fd"/>
    <circle cx="102" cy="158" r="17" fill="#3b82f6"/>
    <text x="102" y="164" text-anchor="middle" class="num">1</text>
    <text x="132" y="165" class="card-title" fill="#1d4ed8">Auth &amp; Accounts</text>
    <text x="95" y="212" class="list">
      <tspan x="95" dy="0">accounts_accounts</tspan>
      <tspan x="95" dy="18">account_emailaddress</tspan>
      <tspan x="95" dy="18">account_emailconfirmation</tspan>
      <tspan x="95" dy="18">socialaccount_socialaccount</tspan>
      <tspan x="95" dy="18">socialaccount_socialapp</tspan>
      <tspan x="95" dy="18">socialaccount_socialtoken</tspan>
      <tspan x="95" dy="18">auth_group</tspan>
      <tspan x="95" dy="18">auth_permission</tspan>
      <tspan x="95" dy="18">django_session</tspan>
    </text>
  </g>

