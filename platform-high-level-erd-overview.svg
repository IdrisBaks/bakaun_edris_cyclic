<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1120" viewBox="0 0 1700 1120" role="img" aria-labelledby="title desc">
  <title id="title">Platform Database - High-Level ERD Overview</title>
  <desc id="desc">A high-level, paper-friendly ERD overview that groups the platform database into 10 modules and shows labeled relationships between them.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="one" viewBox="0 0 12 12" refX="2" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 2 1 L 2 11" stroke="#64748b" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    </marker>
    <marker id="crow" viewBox="0 0 16 12" refX="14" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 1 6 L 14 6 M 14 6 L 2 1 M 14 6 L 2 11" stroke="#64748b" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 700 30px Inter, Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Inter, Arial, sans-serif; fill: #475569; }
      .card-title { font: 700 19px Inter, Arial, sans-serif; }
      .num { font: 700 18px Inter, Arial, sans-serif; fill: #ffffff; }
      .list { font: 14px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #1f2937; }
      .connector {
        fill: none;
        stroke: #64748b;
        stroke-width: 2.4;
        marker-start: url(#one);
        marker-end: url(#crow);
      }
      .label {
        font: 600 15px Inter, Arial, sans-serif;
        fill: #334155;
        paint-order: stroke;
        stroke: #ffffff;
        stroke-width: 5px;
        stroke-linejoin: round;
      }
      .inner { fill: #ffffff; stroke-width: 1.2; }
    </style>
  </defs>

  <rect width="1700" height="1120" fill="url(#bg)"/>

  <text x="850" y="56" text-anchor="middle" class="title">Platform Database - High-Level ERD Overview</text>
  <text x="850" y="87" text-anchor="middle" class="subtitle">Module-based ERD for accounts, jobs, KYC, messaging, finance, admin, and workforce</text>

  <!-- Connectors -->
  <path class="connector" d="M 480 240 C 530 240, 575 240, 625 240"/>
  <path class="connector" d="M 265 130 C 760 48, 1080 48, 1435 130"/>
  <path class="connector" d="M 82 385 C 25 460, 25 620, 120 690"/>
  <path class="connector" d="M 840 385 C 760 420, 650 430, 480 430"/>
  <path class="connector" d="M 480 510 C 530 510, 575 510, 625 510"/>
  <path class="connector" d="M 1055 510 C 1110 510, 1160 510, 1220 510"/>
  <path class="connector" d="M 330 620 C 360 660, 450 664, 540 690"/>
  <path class="connector" d="M 150 620 C 136 652, 122 668, 120 690"/>
  <path class="connector" d="M 1078 690 C 1140 605, 1210 440, 1292 350"/>
  <path class="connector" d="M 980 690 C 820 658, 680 646, 480 620"/>
  <path class="connector" d="M 410 680 C 600 638, 760 638, 870 680"/>
  <path class="connector" d="M 50 250 C 5 250, 5 760, 870 700"/>
  <path class="connector" d="M 1470 690 C 1470 665, 1460 646, 1450 620"/>
  <path class="connector" d="M 1285 680 C 1165 640, 990 640, 825 680"/>
  <path class="connector" d="M 1490 690 C 1550 585, 1580 445, 1455 350"/>
  <path class="connector" d="M 1285 700 C 1070 645, 760 645, 480 620"/>

