<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1120" viewBox="0 0 1700 1120" role="img" aria-labelledby="title desc">
  <title id="title">Platform Database - High-Level ERD Overview</title>
  <desc id="desc">A high-level, paper-friendly ERD overview that groups the platform database into 10 modules and shows labeled relationships between them.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 30px Inter, Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Inter, Arial, sans-serif; fill: #475569; }
      .card-title { font: 700 19px Inter, Arial, sans-serif; }
      .num { font: 700 18px Inter, Arial, sans-serif; fill: #ffffff; }
      .list { font: 14px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #1f2937; }
      .connector { fill: none; stroke: #64748b; stroke-width: 2.4; marker-end: url(#arrow); }
      .label {
        font: 600 15px Inter, Arial, sans-serif;
        fill: #334155;
        paint-order: stroke;
        stroke: #ffffff;
        stroke-width: 5px;
        stroke-linejoin: round;
      }
      .inner { fill: #ffffff; stroke-width: 1.2; }
    </style>
  </defs>

  <rect width="1700" height="1120" fill="url(#bg)"/>

  <text x="850" y="56" text-anchor="middle" class="title">Platform Database - High-Level ERD Overview</text>
  <text x="850" y="87" text-anchor="middle" class="subtitle">Module-based ERD for accounts, jobs, KYC, messaging, finance, admin, and workforce</text>

  <!-- Connectors -->
  <path class="connector" d="M 480 230 C 540 230, 565 230, 625 230"/>
  <text x="552" y="214" text-anchor="middle" class="label">has profile</text>

  <path class="connector" d="M 460 170 C 760 70, 1030 70, 1220 170"/>
  <text x="840" y="122" text-anchor="middle" class="label">submits KYC</text>

  <path class="connector" d="M 250 351 C 250 500, 205 560, 205 690"/>
  <text x="166" y="544" text-anchor="middle" class="label">owns wallet</text>

  <path class="connector" d="M 860 351 C 735 380, 650 385, 460 500"/>
  <text x="650" y="405" text-anchor="middle" class="label">posts / applies</text>

  <path class="connector" d="M 460 510 C 530 510, 540 510, 600 510"/>
  <text x="531" y="494" text-anchor="middle" class="label">creates</text>

  <path class="connector" d="M 1000 510 C 1075 510, 1085 510, 1140 510"/>
  <text x="1070" y="494" text-anchor="middle" class="label">tracks</text>

  <path class="connector" d="M 330 620 C 420 675, 520 710, 510 730"/>
  <text x="430" y="668" text-anchor="middle" class="label">starts conversation</text>

  <path class="connector" d="M 170 620 C 150 655, 145 670, 140 690"/>
  <text x="96" y="651" text-anchor="middle" class="label">generates payment</text>

  <path class="connector" d="M 1060 690 C 1115 585, 1170 430, 1260 350"/>
  <text x="1148" y="544" text-anchor="middle" class="label">reviews</text>

  <path class="connector" d="M 1000 760 C 840 715, 710 665, 430 620"/>
  <text x="776" y="720" text-anchor="middle" class="label">monitors</text>

  <path class="connector" d="M 1310 760 C 1180 760, 1150 760, 1245 760"/>
  <text x="1278" y="744" text-anchor="middle" class="label">audited by</text>

  <path class="connector" d="M 410 790 C 555 790, 690 790, 870 790"/>
  <text x="640" y="772" text-anchor="middle" class="label">feeds records</text>

  <path class="connector" d="M 220 350 C 380 640, 980 710, 960 710"/>
  <text x="520" y="640" text-anchor="middle" class="label">managed by</text>

  <path class="connector" d="M 1472 690 C 1472 585, 1472 500, 1472 620"/>
  <text x="1519" y="589" text-anchor="middle" class="label">records attendance</text>

  <path class="connector" d="M 1285 790 C 1170 790, 1105 790, 960 790"/>
  <text x="1124" y="812" text-anchor="middle" class="label">communicates</text>

  <path class="connector" d="M 1472 690 C 1505 580, 1545 450, 1450 350"/>
  <text x="1570" y="522" text-anchor="middle" class="label">verifies business</text>

  <path class="connector" d="M 1285 745 C 1040 675, 760 660, 460 545"/>
  <text x="890" y="640" text-anchor="middle" class="label">fulfills jobs</text>

