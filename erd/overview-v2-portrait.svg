      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 700 30px Inter, Arial, sans-serif; fill: #14532d; }
      .subtitle { font: 400 16px Inter, Arial, sans-serif; fill: #475569; }
      .module-title { font: 700 18px Inter, Arial, sans-serif; fill: #ffffff; }
      .list { font: 14px "SFMono-Regular", Consolas, Menlo, monospace; fill: #1f2937; }
      .line { fill: none; stroke: #475569; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
      .sym { fill: none; stroke: #475569; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
      .sym-circle { fill: #ffffff; stroke: #475569; stroke-width: 2.2; }
      .label {
        font: 700 14px Inter, Arial, sans-serif;
        fill: #334155;
        paint-order: stroke;
        stroke: #ffffff;
        stroke-width: 6px;
        stroke-linejoin: round;
      }
      .card-outline { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.4; }
    </style>
  </defs>

  <rect width="1240" height="1754" fill="url(#bg)"/>

