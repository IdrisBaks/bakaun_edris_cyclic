<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1754" viewBox="0 0 1240 1754" role="img" aria-labelledby="title desc">
  <title id="title">Platform Database Overview - Portrait</title>
  <desc id="desc">Portrait overview of the platform database modules for paper documents, using proper crow's foot notation symbols and labeled relationships.</desc>
  <defs>
