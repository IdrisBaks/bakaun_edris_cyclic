58" y="210" class="cell">accounts_kycfiles</text><text x="1058" y="228" class="cell">kyc_extracted_data</text><text x="1058" y="246" class="cell">agency_agencykyc</text><text x="1058" y="264" class="cell">agency_agencykycfile</text><text x="1058" y="282" class="cell">agency_kyc_extracted_data</text></g> <g filter="url(#shadow)"><rect x="40" y="360" width="420" height="180" rx="20" ry="20" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/><rect x="40" y="360" width="420" height="44" rx="20" ry="20" fill="#7c3aed"/><text x="58" y="388" fill="#ffffff" class="module-title">Module 4 - Jobs &amp; Applications</text><text x="58" y="432" class="cell">jobs</text><text x="58" y="450" class="cell">job_skill_slots</text><text x="58" y="468" class="cell">job_applications</text><text x="58" y="486" class="cell">job_worker_assignments</text><text x="58" y="504" class="cell">job_employee_assignments</text><text x="58" y="522" class="cell">price_negotiations</text><text x="58" y="540" class="cell">saved_jobs</text></g> <g filter="url(#shadow)"><rect x="540" y="360" width="420" height="180" rx="20" ry="20" fill="#fffbeb" stroke="#d97706" stroke-width="2"/><rect x="540" y="360" width="420" height="44" rx="20" ry="20" fill="#d97706"/><text x="558" y="388" fill="#ffffff" class="module-title">Module 5 - Job Operations</text><text x="558" y="432" class="cell">job_logs</text><text x="558" y="450" class="cell">job_materials</text><text x="558" y="468" class="cell">job_photos</text><text x="558" y="486" class="cell">job_reviews</text><text x="558" y="504" class="cell">job_disputes</text><text x="558" y="522" class="cell">dispute_evidence</text><text x="558" y="540" class="cell">review_skill_tags</text></g> <g filter="url(#shadow)"><rect x="1040" y="360" width="420" height="180" rx="20" ry="20" fill="#fdf2f8" stroke="#db2777" stroke-width="2"/><rect x="1040" y="360" width="420" height="44" rx="20" ry="20" fill="#db2777"/><text x="1058" y="388" fill="#ffffff" class="module-title">Module 6 - Daily Jobs</text><text x="1058" y="432" class="cell">daily_attendance</text><text x="1058" y="450" class="cell">daily_job_extensions</text><text x="1058" y="468" class="cell">daily_rate_changes</text><text x="1058" y="486" class="cell">daily_skip_day_requests</text><text x="1058" y="504" class="cell">backjob_schedule_confirmations</text></g> <g filter="url(#shadow)"><rect x="40" y="650" width="420" height="180" rx="20" ry="20" fill="#f0fdfa" stroke="#0f766e" stroke-width="2"/><rect x="40" y="650" width="420" height="44" rx="20" ry="20" fill="#0f766e"/><text x="58" y="678" fill="#ffffff" class="module-title">Module 7 - Finance &amp; Payments</text><text x="58" y="722" class="cell">accounts_userpaymentmethod</text><text x="58" y="740" class="cell">accounts_wallet</text><text x="58" y="758" class="cell">accounts_transaction</text></g> <g filter="url(#shadow)"><rect x="540" y="650" width="420" height="180" rx="20" ry="20" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/><rect x="540" y="650" width="420" height="44" rx="20" ry="20" fill="#7c3aed"/><text x="558" y="678" fill="#ffffff" class="module-title">Module 8 - Messaging</text><text x="558" y="722" class="cell">conversation</text><text x="558" y="740" class="cell">conversation_participants</text><text x="558" y="758" class="cell">message</text><text x="558" y="776" class="cell">message_attachment</text></g> <g filter="url(#shadow)"><rect x="1040" y="650" width="420" height="220" rx="20" ry="20" fill="#f8fafc" stroke="#4b5563" stroke-width="2"/><rect x="1040" y="650" width="420" height="44" rx="20" ry="20" fill="#4b5563"/><text x="1058" y="678" fill="#ffffff" class="module-title">Module 9 - Admin Panel</text><text x="1058" y="722" class="cell">adminpanel_adminaccount</text><text x="1058" y="740" class="cell">adminpanel_auditlog</text><text x="1058" y="758" class="cell">adminpanel_kyclogs</text><text x="1058" y="776" class="cell">adminpanel_supportticket</text><text x="1058" y="794" class="cell">adminpanel_supportticket